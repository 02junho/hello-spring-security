<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>접근 거부 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .denied-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .denied-code { font-size: 4rem; font-weight: 800; color: #ef4444; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <form th:action="@{/logout}" method="post" class="d-flex ms-auto">
            <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card denied-card p-5 text-center">
                <div class="denied-code">403</div>
                <h4 class="fw-bold mb-2">접근 권한이 없습니다</h4>
                <p class="text-muted mb-4">이 기능은 관리자(ADMIN)만 사용할 수 있습니다.</p>
                <a th:href="@{/products}" class="btn btn-outline-secondary">상품 목록으로</a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
